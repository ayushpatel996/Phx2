services:
  - type: web
    name: phx2-app
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install --legacy-peer-deps && npm run build && cd ..
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn PHx2.wsgi
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: NODE_VERSION
        value: "20.x"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        value: "https://phx2-app.onrender.com/spotify/redirect"
